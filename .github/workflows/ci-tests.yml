name: CI tests

# Manually-dispatched only — no push, no PR, no schedule. The user
# controls when this fires. See .harness/PLAN.md (feat-ci-verification).
on:
  workflow_dispatch:

# If a run is already in progress on the same ref and the user dispatches
# again, cancel the older run. Each runner is a fresh VM that's discarded
# after cancellation, so dpkg/apt/brew partial-install states don't carry
# over.
concurrency:
  group: ci-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # --- Static analysis: shellcheck / actionlint / pwsh AST / lychee / audit --
  #
  # Catches structural issues across all .sh, .ps1, .yml, .md files without
  # spinning up a full install runner. The "static gate" referenced by every
  # other CI job and every task in feat-curl-bash-installer. Runs on
  # ubuntu-latest for speed and to take advantage of pre-installed shellcheck
  # + pwsh.
  static-analysis:
    name: Static analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: shellcheck — lint all .sh files
        run: |
          shellcheck --version
          # -x follows `source` statements; every script that sources lib/os.sh
          # already has a `# shellcheck source=scripts/lib/os.sh` annotation,
          # so cross-file checks resolve without SC1091 noise.
          # .harness/ is vendored from agentic-harness — upstream's lint
          # responsibility, not ours. We own setup.sh + scripts/*.sh.
          find . -type f -name '*.sh' \
            -not -path './.git/*' -not -path './.harness/*' -print0 \
            | xargs -0 shellcheck -x

      - name: actionlint — validate workflow YAML
        run: |
          # Self-contained download of the actionlint binary into the runner —
          # avoids a third-party action dependency.
          bash <(curl -fsSL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          ./actionlint -color

      - name: pwsh AST parse — validate all .ps1 files
        shell: pwsh
        run: |
          # .harness/ is vendored from agentic-harness; upstream's lint
          # responsibility. We own setup.ps1 + scripts/*.ps1.
          $files = Get-ChildItem -Recurse -Filter *.ps1 |
            Where-Object { $_.FullName -notmatch '[\\/]\.harness[\\/]' }
          if ($files.Count -eq 0) {
            Write-Error "no .ps1 files found"
            exit 1
          }
          $failed = @()
          foreach ($f in $files) {
            $errs = $null
            [void][System.Management.Automation.Language.Parser]::ParseFile(
              $f.FullName, [ref]$null, [ref]$errs)
            if ($errs) {
              Write-Host "PARSE ERROR in $($f.FullName):"
              $errs | ForEach-Object { Write-Host "  $_" }
              $failed += $f.FullName
            } else {
              Write-Host "OK: $($f.FullName)"
            }
          }
          if ($failed.Count -gt 0) {
            Write-Error "AST parse errors in $($failed.Count) of $($files.Count) files"
            exit 1
          }
          Write-Host "$($files.Count) .ps1 files parsed cleanly"

      - name: lychee — internal markdown link check
        # Excludes external http(s) URLs to avoid flaky third-party
        # rate-limits; v1 only gates internal cross-links between .md files
        # in this repo. External-link verification stays a manual
        # release-time concern. .harness/ is vendored from agentic-harness
        # and excluded for the same reason as shellcheck/pwsh AST.
        uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress --exclude "^https?://" --exclude-path .harness "**/*.md"
          fail: true

      - name: audit — secret-shaped + personal-data scan
        # Mirrors the manual task-1 audit so future PRs are gated:
        # (1) API-key shapes — AWS, Stripe, GitHub PAT, Slack, Google OAuth, JWT.
        # (2) Maintainer's personal (non-noreply) email — should never appear.
        # (3) Hardcoded /Users/alex/ paths — use //Users/*/ glob instead.
        #
        # Exclusions:
        # - workflows/ dir: this audit step's regex contains literal pattern
        #   substrings (xoxb-, xoxp-, ya29., eyJ, /Users/alex/) that would
        #   self-match. Workflow YAML is independently linted by actionlint
        #   and reviewed manually for hardcoded keys.
        # - PLAN.md / progress.md / CHANGELOG.md: legitimately reference the
        #   historical leak in narrative form (excluded only for the path scan).
        run: |
          set -e
          if grep -rIinE '\b(AKIA[0-9A-Z]{16}|ASIA[0-9A-Z]{16}|sk_live_[0-9a-zA-Z]{24,}|pk_live_[0-9a-zA-Z]{24,}|gh[pousr]_[0-9a-zA-Z]{36,}|xoxb-|xoxp-|ya29\.|eyJ[A-Za-z0-9_-]{10,}\.eyJ)' \
               --exclude-dir='.git' --exclude-dir='workflows' . ; then
            echo "FAIL: secret-shaped strings detected"
            exit 1
          fi
          if grep -rIn 'alexmherrero@gmail\.com' \
               --exclude-dir='.git' --exclude-dir='workflows' \
               --exclude=PLAN.md --exclude=progress.md --exclude=CHANGELOG.md . ; then
            echo "FAIL: personal email (non-noreply) found"
            exit 1
          fi
          hits=$(grep -rIn '/Users/alex/' \
                 --exclude-dir='.git' --exclude-dir='workflows' \
                 --exclude=PLAN.md --exclude=progress.md --exclude=CHANGELOG.md . || true)
          if [[ -n "$hits" ]]; then
            echo "FAIL: hardcoded /Users/alex/ paths found (use //Users/*/ glob):"
            echo "$hits"
            exit 1
          fi
          echo "OK: no API-key-shaped strings, personal email, or hardcoded user paths"

      - name: LICENSE present and non-empty
        run: |
          if [[ ! -f LICENSE ]]; then
            echo "FAIL: LICENSE file missing"
            exit 1
          fi
          if [[ ! -s LICENSE ]]; then
            echo "FAIL: LICENSE file empty"
            exit 1
          fi
          echo "OK: LICENSE present and non-empty"

  # --- macOS: full Mac pipeline minus GUI apps -------------------------------
  #
  # GUI installer (install-gui-apps.sh) is browser-assisted and can't run in
  # CI, so we use --skip-apps. Homebrew is pre-installed on macos-latest, so
  # install-brew.sh exercises only its "brew already installed; install
  # formulae" branch — the bootstrap-brew-from-scratch branch is an
  # acknowledged gap.
  macos-test:
    name: macOS (macos-latest)
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: setup.sh --help shows the macOS stage list
        run: |
          ./setup.sh --help
          ./setup.sh --help | grep -qF 'Stages (macos):'

      - name: setup.sh --dry-run resolves all 6 Mac stages
        run: ./setup.sh --dry-run

      - name: end-to-end install (--skip-apps)
        run: ./setup.sh --skip-apps

      - name: verify-install reports 0 warn
        # SKIP_APPS=1 is what setup.sh exports when --skip-apps is passed;
        # we set it explicitly here because each GH Actions step is a fresh
        # shell. Without it, verify-install would WARN on the missing
        # /Applications/*.app entries that we deliberately didn't install.
        env:
          SKIP_APPS: '1'
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          ./scripts/verify-install.sh | tee /tmp/verify.out
          grep -qE 'summary:.*0 warn' /tmp/verify.out

      - name: idempotency — re-run produces no repo drift
        run: |
          ./setup.sh --skip-apps
          git status --porcelain
          [[ -z "$(git status --porcelain)" ]]

      - name: --with-codex installs Codex CLI
        run: |
          ./setup.sh --skip-apps --with-codex
          export PATH="$HOME/.local/bin:$PATH"
          command -v codex
          codex --version

  # --- Ubuntu: full Debian pipeline -----------------------------------------
  #
  # ubuntu-latest is currently 24.04 (Noble), where shfmt is in apt. The
  # GitHub-release shfmt fallback path (Debian 11 / Ubuntu 22.04) is an
  # acknowledged gap; could be added as a matrix later if regression
  # warrants. Job runs as the runner user with passwordless sudo.
  ubuntu-test:
    name: Ubuntu (ubuntu-latest)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: setup.sh --help shows the Debian stage list
        run: |
          ./setup.sh --help
          ./setup.sh --help | grep -qF 'Stages (debian):'

      - name: setup.sh --dry-run resolves all 5 Debian stages
        run: ./setup.sh --dry-run

      - name: end-to-end install
        run: ./setup.sh

      - name: verify-install reports 0 warn
        run: |
          export PATH="$HOME/.local/bin:$HOME/.npm-global/bin:$PATH"
          ./scripts/verify-install.sh | tee /tmp/verify.out
          grep -qE 'summary:.*0 warn' /tmp/verify.out

      - name: idempotency — re-run produces no repo drift
        run: |
          ./setup.sh
          git status --porcelain
          [[ -z "$(git status --porcelain)" ]]

      - name: --with-codex installs Codex CLI
        run: |
          ./setup.sh --with-codex
          export PATH="$HOME/.local/bin:$HOME/.npm-global/bin:$PATH"
          command -v codex
          codex --version

      - name: negative test — Mac-only paths not created on Linux
        run: |
          if [[ -e "$HOME/Library/Application Support/Claude" ]]; then
            echo "FAIL: Mac-only Claude Desktop config path was created on Linux"
            ls -la "$HOME/Library/Application Support/Claude"
            exit 1
          fi
          echo "OK: ~/Library/Application Support/Claude was not created"

  # --- Windows: full install pipeline ----------------------------------------
  #
  # Real install verification, parallel to the Mac job (also -SkipApps —
  # GUI sign-ins need a human). winget for the toolchain + Claude Code,
  # npm for Gemini, Codex skip-with-warn (upstream broken on Windows).
  # AST-parse step preserved from the prior smoke job as a regression catch.
  windows-test:
    name: Windows (windows-latest)
    runs-on: windows-latest
    timeout-minutes: 30
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4

      - name: setup.ps1 -Help shows the 6-stage list
        run: |
          # setup.ps1 prints via Write-Host (Information stream, #6). The
          # `6>&1` redirect routes it to the success stream so we can capture
          # into a variable for the regex assertion. Also call once without
          # capture so the help is visible in the GH Actions log for debugging.
          ./setup.ps1 -Help
          $help = ./setup.ps1 -Help 6>&1 | Out-String
          if ($help -notmatch 'tooling' -or $help -notmatch 'auth-checklist') {
            Write-Error "setup.ps1 -Help missing expected stages"
            exit 1
          }

      - name: setup.ps1 -DryRun resolves all 6 stages
        run: ./setup.ps1 -DryRun

      - name: end-to-end install (-SkipApps)
        run: ./setup.ps1 -SkipApps

      - name: verify-install reports 0 warn
        # SKIP_APPS=1 is what setup.ps1 -SkipApps exports; we set it explicitly
        # here because each GH Actions step is a fresh shell. Without it,
        # verify-install would WARN on the missing GUI apps that we deliberately
        # didn't install. Same posture as the macOS job.
        # `6>&1` redirects the Information stream (Write-Host output) into the
        # success pipeline so Tee-Object can capture it. Without this the file
        # would be empty and the Select-String assertion would always fail.
        env:
          SKIP_APPS: '1'
        run: |
          # Refresh PATH from the registry: winget installs in the previous
          # step landed in the user PATH hive, but this is a fresh GH Actions
          # step shell that inherited the runner agent's stale PATH (captured
          # at service start, before our winget calls). Without this refresh,
          # rg + claude would WARN even though they were installed.
          $env:Path = [System.Environment]::GetEnvironmentVariable('Path','Machine') + ';' + [System.Environment]::GetEnvironmentVariable('Path','User')
          # Tee to RUNNER_TEMP, not the repo working dir — otherwise the
          # untracked `verify.out` shows up in `git status` during the next
          # step's idempotency check (mirrors the Mac/Linux jobs writing to
          # /tmp/verify.out).
          $verifyOut = Join-Path $env:RUNNER_TEMP 'verify.out'
          ./scripts/verify-install.ps1 6>&1 | Tee-Object -FilePath $verifyOut
          if (-not (Select-String -Path $verifyOut -Pattern 'summary:.*0 warn' -Quiet)) {
            Write-Error "verify-install reported warns; expected 0"
            exit 1
          }

      - name: idempotency — re-run produces no repo drift
        run: |
          $env:Path = [System.Environment]::GetEnvironmentVariable('Path','Machine') + ';' + [System.Environment]::GetEnvironmentVariable('Path','User')
          ./setup.ps1 -SkipApps
          $diff = git status --porcelain
          if ($diff) {
            Write-Host "FAIL: re-run produced repo drift:"
            Write-Host "--- git status --porcelain ---"
            Write-Host $diff
            Write-Host "--- git status (verbose) ---"
            git status
            Write-Host "--- git diff ---"
            git diff
            exit 1
          }

      - name: -WithCodex still exits 0 (Codex skip-with-warn on Windows)
        # Codex on Windows is currently skip-with-warn even when the user opts
        # in (install-clis.ps1 cites openai/codex#18648 + #11744). The -WithCodex
        # variant must therefore exit 0 cleanly, NOT install codex. The
        # assertion is "exit code 0", not "codex resolves on PATH".
        run: |
          ./setup.ps1 -SkipApps -WithCodex
          if (Get-Command codex -ErrorAction SilentlyContinue) {
            Write-Error "FAIL: codex unexpectedly resolved on PATH — Windows path should skip-with-warn"
            exit 1
          }
          Write-Host "OK: codex correctly skipped on Windows even with -WithCodex"

      - name: AST-parse all .ps1 files
        run: |
          $files = Get-ChildItem -Recurse -Filter *.ps1
          if ($files.Count -eq 0) {
            Write-Error "no .ps1 files found"
            exit 1
          }
          $failed = @()
          foreach ($f in $files) {
            $errs = $null
            [void][System.Management.Automation.Language.Parser]::ParseFile(
              $f.FullName, [ref]$null, [ref]$errs)
            if ($errs) {
              Write-Host "PARSE ERROR in $($f.FullName):"
              $errs | ForEach-Object { Write-Host "  $_" }
              $failed += $f.FullName
            } else {
              Write-Host "OK: $($f.FullName)"
            }
          }
          if ($failed.Count -gt 0) {
            Write-Error "AST parse errors in $($failed.Count) of $($files.Count) files"
            exit 1
          }
          Write-Host "$($files.Count) .ps1 files parsed cleanly"
